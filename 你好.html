<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>你好页面</title>
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f5f5f5;
        color: #333;
      }
      .card {
        padding: 2rem 3rem;
        border-radius: 16px;
        background: white;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
        text-align: center;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 3rem;
      }
      p {
        margin: 0;
        font-size: 1.1rem;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>你好</h1>
      <p>欢迎来到你的新页面！</p>
    </div>
  </body>
</html>
